<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Panda Gallery v4.0 — Splash</title>
<style>
  :root {
    --canvas:       #14141f;
    --chrome:       #161625;
    --pane:         #1a1a2e;
    --pane-raised:  #22223a;
    --border:       #2a2a3e;
    --text:         #e0ddd5;
    --text-muted:   #888;
    --text-dim:     #555;
    --accent:       #e8a87c;
    --accent-hover: #d4945a;
    --accent-soft:  rgba(232, 168, 124, 0.12);
    --accent-border:rgba(232, 168, 124, 0.45);
    --accent-ink:   #1a1a2e;
    --font-ui:      "Segoe UI", "SF Pro", "Noto Sans", sans-serif;
    --font-mono:    "Cascadia Mono", "Consolas", monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: var(--canvas);
    color: var(--text);
    font-family: var(--font-ui);
    overflow: hidden;
  }

  /* ===== Ambient atmosphere ===== */
  .atmosphere {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 45%, rgba(232, 168, 124, 0.08) 0%, transparent 70%),
      radial-gradient(ellipse 80% 50% at 50% 100%, rgba(232, 168, 124, 0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Subtle grain/noise */
  .grain {
    position: fixed; inset: 0;
    opacity: 0.025;
    pointer-events: none;
    background-image:
      repeating-radial-gradient(circle at 0 0, transparent 0, var(--text) 1px, transparent 2px, transparent 4px);
  }

  /* ===== Splash layout ===== */
  .splash {
    position: relative;
    width: 100vw; height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .logo-stage {
    display: flex;
    align-items: center;
    gap: 60px;
    margin-bottom: 80px;
    animation: fadeUp 0.9s cubic-bezier(0.2, 0.8, 0.2, 1) both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    filter: drop-shadow(0 0 30px rgba(232, 168, 124, 0.1));
  }

  .wordmark-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 18px;
  }

  .pill {
    background: linear-gradient(180deg, #22223a 0%, #1a1a2e 100%);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 24px 56px;
    position: relative;
    box-shadow:
      0 0 60px rgba(232, 168, 124, 0.08),
      inset 0 0 0 1px rgba(232, 168, 124, 0.06);
  }

  .wordmark {
    font-family: var(--font-ui);
    font-size: 72px;
    font-weight: 700;
    letter-spacing: 10px;
    background: linear-gradient(180deg, #f0b98c 0%, #e8a87c 50%, #d4945a 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 40px rgba(232, 168, 124, 0.3);
    line-height: 1;
  }

  .tagline {
    font-family: var(--font-mono);
    font-size: 15px;
    color: var(--text-muted);
    letter-spacing: 8px;
    text-transform: uppercase;
    padding-left: 56px;
  }
  .tagline .version {
    color: var(--accent);
  }

  /* ===== Status area ===== */
  .status-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    min-height: 80px;
    animation: fadeIn 1.4s 0.4s both ease-out;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .loading-bar {
    width: 320px;
    height: 2px;
    background: var(--pane-raised);
    border-radius: 1px;
    overflow: hidden;
    position: relative;
  }
  .loading-fill {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    width: 40%;
    background: linear-gradient(90deg, transparent 0%, var(--accent) 50%, transparent 100%);
    animation: slide 1.8s ease-in-out infinite;
  }
  @keyframes slide {
    0%   { left: -40%; }
    100% { left: 100%; }
  }

  .status-line {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }
  .status-line .ok { color: var(--accent); }

  /* ===== Footer ===== */
  .splash-footer {
    position: absolute;
    bottom: 32px;
    left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 0 40px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }
  .splash-footer .right { color: var(--text-dim); }
  .splash-footer .right b { color: var(--text-muted); font-weight: 400; }

  /* Responsive: scale down on narrower windows */
  @media (max-width: 900px) {
    .logo-stage { gap: 30px; flex-direction: column; }
    .panda-mark { width: 160px; height: 160px; }
    .wordmark { font-size: 54px; letter-spacing: 7px; }
    .pill { padding: 18px 40px; }
    .tagline { padding-left: 0; }
  }
</style>
</head>
