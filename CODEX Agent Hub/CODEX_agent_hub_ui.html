<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PANDA Agent Hub</title>
<style>
:root {
  --canvas: #14141f;
  --panel: #1a1a2e;
  --panel-2: #202038;
  --field: #10111b;
  --border: #2a2a3e;
  --text: #e0ddd5;
  --muted: #aaa59b;
  --quiet: #888888;
  --accent: #e8a87c;
  --accent-ink: #24150e;
  --ok: #7fb069;
  --warn: #d7b86b;
  --err: #e74c3c;
  --focus: rgba(232, 168, 124, .42);
}
* { box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  margin: 0;
  background: var(--canvas);
  color: var(--text);
  font: 14px/1.35 "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  letter-spacing: 0;
}
button { font: inherit; }
button {
  min-height: 34px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: rgba(224, 221, 213, .05);
  color: var(--text);
  padding: 0 12px;
  cursor: pointer;
}
button.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--accent-ink);
  font-weight: 800;
}
button.secondary { background: transparent; color: var(--muted); }
button:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }
button[disabled] { opacity: .48; cursor: default; }

.app {
  height: 100vh;
  min-width: 980px;
  min-height: 620px;
  display: grid;
  grid-template-rows: 64px 1fr 44px;
}
.topbar {
  display: grid;
  grid-template-columns: 260px 1fr auto;
  align-items: center;
  gap: 18px;
  padding: 0 18px;
  border-bottom: 1px solid var(--border);
  background: #151526;
}
.brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
.mark {
  width: 30px;
  height: 30px;
  border-radius: 10px;
  display: grid;
  place-items: center;
  background: var(--accent);
  color: var(--accent-ink);
  font-weight: 900;
}
.brand-title { font-size: 15px; font-weight: 900; }
.brand-sub { color: var(--quiet); font-size: 12px; margin-top: 2px; }
.status-line {
  min-width: 0;
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
}
.system-state {
  color: var(--text);
  font-size: 18px;
  font-weight: 900;
  overflow: hidden;
  text-overflow: ellipsis;
}
.meta { color: var(--quiet); font-size: 12px; }
.top-actions { display: flex; gap: 8px; align-items: center; }

.main {
  min-height: 0;
  display: grid;
  grid-template-columns: 220px minmax(420px, 1fr) 360px;
  gap: 12px;
  padding: 12px;
  overflow: hidden;
}
.panel {
  min-width: 0;
  min-height: 0;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--panel);
  overflow: hidden;
  display: grid;
  grid-template-rows: auto 1fr;
}
.panel-head {
  min-height: 44px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.panel-title { font-size: 12px; font-weight: 900; color: var(--muted); text-transform: uppercase; }
.count { color: var(--text); font-weight: 900; }
.scroll { min-height: 0; overflow: auto; }

.agents { padding: 8px; display: grid; gap: 8px; align-content: start; }
.agent {
  border: 1px solid var(--border);
  border-radius: 7px;
  background: #161624;
  padding: 10px;
  display: grid;
  grid-template-columns: 34px 1fr;
  gap: 10px;
}
.avatar {
  width: 34px;
  height: 34px;
  border-radius: 7px;
  background: var(--panel-2);
  display: grid;
  place-items: center;
  font-weight: 900;
}
.agent-name { font-weight: 900; }
.agent-note { color: var(--quiet); font-size: 12px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.agent-count { grid-column: 2; color: var(--muted); font-size: 12px; }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: var(--quiet); margin-right: 6px; }
.dot.ok { background: var(--ok); }
.dot.warn { background: var(--warn); }
.dot.err { background: var(--err); }
.dot.active { background: var(--accent); }

.queue-panel { grid-template-rows: auto auto 1fr; }
.summary-strip {
  padding: 12px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  border-bottom: 1px solid var(--border);
}
.summary {
  min-height: 70px;
  border: 1px solid var(--border);
  border-radius: 7px;
  background: #161624;
  padding: 10px;
}
.summary strong { display: block; font-size: 24px; line-height: 1; }
.summary span { color: var(--muted); font-size: 12px; }
.summary.warn { border-color: rgba(215, 184, 107, .56); }
.summary.err { border-color: rgba(231, 76, 60, .62); }

.action-list { padding: 8px; display: grid; gap: 8px; align-content: start; }
.action {
  width: 100%;
  text-align: left;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #171727;
  color: var(--text);
  padding: 12px;
  display: grid;
  gap: 8px;
}
.action.selected { border-color: rgba(232, 168, 124, .8); box-shadow: inset 3px 0 0 var(--accent); }
.action.warn { border-color: rgba(215, 184, 107, .56); }
.action-title { font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.action-summary { color: var(--muted); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tag-row { display: flex; gap: 6px; flex-wrap: wrap; }
.tag {
  min-height: 22px;
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 2px 8px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
}
.tag.wake { border-color: rgba(215, 184, 107, .75); color: #ecd9a4; }
.tag.decision { border-color: rgba(232, 168, 124, .6); color: #f0bf9d; }
.tag.unread { border-color: rgba(224, 221, 213, .22); color: var(--text); }
.empty {
  padding: 28px;
  color: var(--muted);
  text-align: center;
}

.detail-panel { grid-template-rows: auto 1fr auto; }
.detail-body { padding: 14px; display: grid; gap: 12px; align-content: start; }
.detail-title { font-size: 20px; line-height: 1.15; font-weight: 900; }
.detail-summary { color: var(--muted); }
.fact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.fact {
  border: 1px solid var(--border);
  border-radius: 7px;
  background: #161624;
  padding: 9px;
  min-width: 0;
}
.fact-label { color: var(--quiet); font-size: 11px; font-weight: 900; text-transform: uppercase; }
.fact-value { margin-top: 4px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.wake-box {
  border: 1px solid rgba(215, 184, 107, .45);
  border-radius: 7px;
  background: rgba(215, 184, 107, .07);
  padding: 10px;
  display: grid;
  gap: 8px;
}
.wake-label { color: #ecd9a4; font-size: 12px; font-weight: 900; text-transform: uppercase; }
.wake-line {
  min-height: 54px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--field);
  color: var(--text);
  padding: 9px;
  font: 12px/1.4 "Cascadia Mono", Consolas, monospace;
}
.detail-actions {
  border-top: 1px solid var(--border);
  padding: 10px;
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}
.footer {
  border-top: 1px solid var(--border);
  background: #151526;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 12px;
  padding: 0 14px;
  color: var(--quiet);
  font-size: 12px;
}
.diag { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.footer strong { color: var(--muted); }
@media (max-width: 1160px) {
  .app { min-width: 900px; }
  .main { grid-template-columns: 196px minmax(390px, 1fr) 320px; }
  .summary-strip { grid-template-columns: 1fr; }
  .summary { min-height: 48px; display: flex; align-items: center; gap: 10px; }
  .summary strong { font-size: 20px; }
}
@media (max-height: 720px) {
  .app { grid-template-rows: 54px 1fr 38px; min-height: 580px; }
  .topbar { padding: 0 14px; }
  .main { padding: 10px; gap: 10px; }
  .summary { min-height: 58px; }
  .action { padding: 10px; }
  .detail-title { font-size: 18px; }
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="mark">P</div>
      <div>
        <div class="brand-title">PANDA Agent Hub</div>
        <div class="brand-sub">Action console</div>
      </div>
    </div>
    <div class="status-line">
      <div class="system-state" id="systemState">Loading...</div>
      <div class="meta" id="asOf">as of --</div>
    </div>
    <div class="top-actions">
      <button id="refresh">Refresh</button>
      <button disabled>Compose</button>
    </div>
  </header>

  <main class="main">
    <section class="panel">
      <div class="panel-head">
        <div class="panel-title">Agents</div>
        <div class="count" id="agentCount">0</div>
      </div>
      <div class="scroll">
        <div class="agents" id="agentList"></div>
      </div>
    </section>

    <section class="panel queue-panel">
      <div class="panel-head">
        <div class="panel-title">Action Queue</div>
        <div class="count" id="queueCount">0</div>
      </div>
      <div class="summary-strip" id="summaryStrip"></div>
      <div class="scroll">
        <div class="action-list" id="actionList"></div>
      </div>
    </section>

    <section class="panel detail-panel">
      <div class="panel-head">
        <div class="panel-title">Selected Item</div>
        <span class="tag" id="selectedKind">none</span>
      </div>
      <div class="scroll">
        <div class="detail-body">
          <div class="detail-title" id="detailTitle">No item selected</div>
          <div class="detail-summary" id="detailSummary">The queue is loading.</div>
          <div class="fact-grid" id="factGrid"></div>
          <div class="wake-box">
            <div class="wake-label">Wake line</div>
            <div class="wake-line" id="wakeLine">No wake needed.</div>
          </div>
        </div>
      </div>
      <div class="detail-actions">
        <button class="secondary" id="openMessage">Open message</button>
        <button class="secondary" id="markRead">Mark read</button>
        <button class="primary" id="copyWake">Copy wake line</button>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="diag" id="diagnosticsLine">Diagnostics quiet.</div>
    <div><strong id="gitState">git</strong></div>
  </footer>
</div>

<script>
let cockpit = null;
let selected = null;

function esc(value) {
  return String(value ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}
function fmtTime(value) {
  if (!value) return '--';
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return String(value).slice(0, 16);
  return date.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
}
function statusClass(value) {
  const text = String(value || '').toLowerCase();
  if (text.includes('err') || text.includes('fail')) return 'err';
  if (text.includes('warn') || text.includes('held') || text.includes('wake') || text.includes('wait')) return 'warn';
  if (text.includes('active')) return 'active';
  return 'ok';
}
function kindClass(kind) {
  if (kind === 'wake') return 'wake';
  if (kind === 'decision') return 'decision';
  return 'unread';
}
function setHTML(id, html) {
  document.getElementById(id).innerHTML = html;
}
async function loadCockpit() {
  const res = await fetch('/api/cockpit');
  cockpit = await res.json();
  selected = (cockpit.action_queue || [])[0] || null;
  render();
}
function render() {
  const state = cockpit.cockpit_state || {};
  const counts = state.counts || {};
  const queue = cockpit.action_queue || [];
  const stale = counts.stale_unread || 0;
  const decisions = counts.decisions_needed || 0;
  const systemText = stale
    ? `${stale} message${stale === 1 ? '' : 's'} need wake-up`
    : decisions
      ? `${decisions} decision${decisions === 1 ? '' : 's'} waiting`
      : 'No urgent action';
  document.getElementById('systemState').textContent = systemText;
  document.getElementById('asOf').textContent = `as of ${fmtTime(state.as_of_iso || cockpit.generated_at)}`;
  document.getElementById('queueCount').textContent = queue.length;
  document.getElementById('gitState').textContent = cockpit.git?.status_label || 'git';
  renderAgents(cockpit.agents || []);
  renderSummary(counts, cockpit.diagnostics || {});
  renderQueue(queue);
  renderDetail(selected);
  renderDiagnostics(cockpit.diagnostics || {});
}
function renderAgents(agents) {
  document.getElementById('agentCount').textContent = agents.length;
  setHTML('agentList', agents.map(agent => `
    <div class="agent">
      <div class="avatar">${esc(agent.code)}</div>
      <div>
        <div class="agent-name"><span class="dot ${statusClass(agent.status)}"></span>${esc(agent.display_name)}</div>
        <div class="agent-note" title="${esc(agent.summary_line)}">${esc(agent.status_label || agent.summary_line || 'Ready')}</div>
      </div>
      <div class="agent-count">${esc(agent.count_value)} ${esc(agent.count_label)}</div>
    </div>
  `).join(''));
}
function renderSummary(counts, diagnostics) {
  const diagProblems = Number(diagnostics.checks_warn || 0) + Number(diagnostics.checks_fail || 0);
  const cards = [
    ['Needs wake', counts.stale_unread || 0, 'Unread over 60 seconds', counts.stale_unread ? 'warn' : ''],
    ['Unread', counts.unread || 0, 'Waiting in mailbox', ''],
    ['Diagnostics', diagProblems, diagProblems ? 'Needs review' : 'Quiet', diagProblems ? 'warn' : ''],
  ];
  setHTML('summaryStrip', cards.map(([label, value, note, tone]) => `
    <div class="summary ${esc(tone)}"><strong>${esc(value)}</strong><span>${esc(label)} - ${esc(note)}</span></div>
  `).join(''));
}
function renderQueue(queue) {
  if (!queue.length) {
    setHTML('actionList', '<div class="empty">Nothing needs action right now.</div>');
    return;
  }
  setHTML('actionList', queue.map(item => `
    <button class="action ${item.id === selected?.id ? 'selected' : ''} ${esc(item.severity)}" data-id="${esc(item.id)}">
      <div class="tag-row"><span class="tag ${kindClass(item.kind)}">${esc(item.kind === 'wake' ? 'Needs wake-up' : item.kind)}</span></div>
      <div class="action-title">${esc(item.title)}</div>
      <div class="action-summary">${esc(item.summary)}</div>
    </button>
  `).join(''));
  document.querySelectorAll('.action').forEach(button => {
    button.addEventListener('click', () => {
      selected = queue.find(item => item.id === button.dataset.id) || null;
      render();
    });
  });
}
function renderDetail(item) {
  const kind = item?.kind || 'none';
  document.getElementById('selectedKind').textContent = kind === 'wake' ? 'needs wake-up' : kind;
  document.getElementById('selectedKind').className = `tag ${kindClass(kind)}`;
  document.getElementById('detailTitle').textContent = item?.title || 'No item selected';
  document.getElementById('detailSummary').textContent = item?.summary || 'No current action is required.';
  const facts = [
    ['Primary action', item?.primary_action || 'None'],
    ['Secondary action', item?.secondary_action || 'None'],
    ['Thread', item?.thread_id || 'None'],
    ['Writes', 'None from this screen'],
  ];
  setHTML('factGrid', facts.map(([label, value]) => `
    <div class="fact"><div class="fact-label">${esc(label)}</div><div class="fact-value" title="${esc(value)}">${esc(value)}</div></div>
  `).join(''));
  document.getElementById('wakeLine').textContent = item?.wake_line || cockpit?.wake?.line || 'No wake needed.';
  document.getElementById('copyWake').disabled = !(item?.wake_line || cockpit?.wake?.line);
  document.getElementById('markRead').disabled = !item?.message_path;
  document.getElementById('openMessage').disabled = !item?.message_path;
}
function renderDiagnostics(diagnostics) {
  const warn = Number(diagnostics.checks_warn || 0);
  const fail = Number(diagnostics.checks_fail || 0);
  const text = fail || warn
    ? `Diagnostics need review: ${fail} failed, ${warn} warning.`
    : `Diagnostics quiet. ${diagnostics.checks_pass || 0}/${diagnostics.checks_total || 0} checks pass.`;
  document.getElementById('diagnosticsLine').textContent = text;
}
document.getElementById('refresh').addEventListener('click', loadCockpit);
document.getElementById('copyWake').addEventListener('click', async () => {
  const text = document.getElementById('wakeLine').textContent || '';
  try { await navigator.clipboard.writeText(text); } catch (err) {}
});
document.getElementById('openMessage').addEventListener('click', async () => {
  if (!selected?.message_path) return;
  await fetch(`/api/open?path=${encodeURIComponent(selected.message_path)}`);
});
document.getElementById('markRead').addEventListener('click', async () => {
  if (!selected?.message_path) return;
  await fetch('/api/message-read-state', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({path: selected.message_path, state: 'read', actor: 'codex'})
  });
  await loadCockpit();
});
document.addEventListener('keydown', event => {
  if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'r') {
    event.preventDefault();
    loadCockpit();
  }
});
loadCockpit();
</script>
</body>
</html>
